name: Emit Sustainability Metrics

on:
  push:
    branches: [main]

jobs:
  report-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fake Sustainability Metrics
        id: fake
        run: |
          echo "carbon_emission=0.42" >> $GITHUB_OUTPUT
          echo "energy_used=1.5" >> $GITHUB_OUTPUT
          echo "network_usage=120.3" >> $GITHUB_OUTPUT

      - name: Send metrics to test endpoint
        env:
          API_TOKEN: dummy-secret
        run: |
          curl -X POST https://webhook.site/cf18b7b0-ddad-4cc2-8a6e-fc7cdfc8f973 \
            -H "Content-Type: application/json" \
            -d '{
              "commit": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "actor": "${{ github.actor }}",
              "carbon_emission": "${{ steps.fake.outputs.carbon_emission }}",
              "energy_used": "${{ steps.fake.outputs.energy_used }}",
              "network_usage": "${{ steps.fake.outputs.network_usage }}"
            }'
      - name: ✅ Metrics sent successfully!
        run: echo "Dummy sustainability metrics posted to webhook.site 🎉"
