      - name: Send complete measurement JSON to webhook
        run: |
          # Create a clean list of <tr> rows with 5 <td> cells (data rows only)
          data_rows=$(xmllint --html --xpath '//tr[count(td)=5]' /tmp/eco-ci/output.txt 2>/dev/null | grep -oP '(?<=<tr>).*?(?=</tr>)')
      
          # Build base JSON
          export REPO="${{ github.repository }}"
          export BRANCH="${{ github.ref_name }}"
          export COMMIT="${{ github.sha }}"
          export JOB_ID="${{ github.run_id }}"
          export RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      
          json=$(envsubst <<EOF
          {
            "repository": "$REPO",
            "branch": "$BRANCH",
            "commit_sha": "$COMMIT",
            "job_id": "$JOB_ID",
            "timestamp": "$TIMESTAMP",
            "run_url": "$RUN_URL",
            "measurements": []
          }
          EOF
          )
      
          # Parse each row and extract cell values
          echo "$data_rows" | while IFS= read -r row; do
            fields=()
            while [[ "$row" =~ <td>(.*?)</td> ]]; do
              fields+=("${BASH_REMATCH[1]}")
              row=${row#*</td>}
            done
      
            label="${fields[0]}"
            cpu="${fields[1]}"
            energy="${fields[2]}"
            power="${fields[3]}"
            duration="${fields[4]}"
      
            # Only add if label is not empty
            if [[ -n "$label" ]]; then
              measurement=$(jq -n \
                --arg label "$label" \
                --arg cpu "$cpu" \
                --arg energy "$energy" \
                --arg power "$power" \
                --arg duration "$duration" \
                '{
                  label: $label,
                  avg_cpu_utilization_percent: ($cpu | test("N/A") | not ? ($cpu | tonumber) : null),
                  total_energy_joules: ($energy | test("N/A") | not ? ($energy | tonumber) : null),
                  avg_power_watts: ($power | test("N/A") | not ? ($power | tonumber) : null),
                  duration_seconds: ($duration | test("N/A") | not ? ($duration | tonumber) : null)
                }')
      
              json=$(echo "$json" | jq --argjson m "$measurement" '.measurements += [$m]')
            fi
          done
      
          echo "Final JSON payload:"
          echo "$json"
      
          # Send to webhook
          curl -X POST "${ECO_CI_API_ENDPOINT_ADD}" \
            -H "Content-Type: application/json" \
            --data "$json"
