      #     # Extract measurement values (fallback to 0 if missing)
      #     CO2=$(grep -oP 'CO2 Emissions: \K[0-9.]+' /tmp/eco-ci/output.txt || echo "0")
      #     ENERGY=$(grep -oP 'Energy Used: \K[0-9.]+' /tmp/eco-ci/output.txt || echo "0")

      #     # Add metadata from GitHub Actions environment
