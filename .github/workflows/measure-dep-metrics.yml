name: Measure Deployment Emissions

on: [push]

jobs:
  measure-deployment:
    runs-on: ubuntu-latest
    env:
      ECO_CI_SEND_DATA: "false"
      ECO_CI_DISPLAY_BADGE: "false"
      ECO_CI_DISPLAY_TABLE: "true"
      ECO_CI_SHOW_CARBON: "true"
      ECO_CI_FILTER_TYPE: "machine.ci"
      ECO_CI_FILTER_PROJECT: "CI/CD"
      ECO_CI_FILTER_MACHINE: "saas-linux-small-amd64"
      ECO_CI_FILTER_TAGS: ""
      ECO_CI_JSON_OUTPUT: "false"
      ECO_CI_CALCULATE_CO2: "false"
      ECO_CI_CLONE_BRANCH: "main"
      ECO_CI_MACHINE_POWER_DATA: "gitlab_EPYC_7B12_saas-linux-small-amd64.sh"
      ECO_CI_API_ENDPOINT_ADD: "https://webhook.site/ae676aed-e158-4cf4-beb1-dab35dec2773"
      ECO_CI_API_BADGE_GET: ""
      ECO_CI_DASHBOARD_URL: ""
      ECO_CI_GMT_API_TOKEN: ""
      ECO_CI_ELECTRICITYMAPS_API_TOKEN: ${{ secrets.ELECTRICITYMAPS_API_TOKEN }}
      ECO_CI_LABEL: "Deployment_Main"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Clone Eco-CI
        run: |
          git clone --depth 1 --single-branch --branch main https://github.com/green-coding-solutions/eco-ci-energy-estimation /tmp/eco-ci-repo

      - name: Start Measurement
        run: |
          /tmp/eco-ci-repo/scripts/setup.sh start_measurement "${ECO_CI_MACHINE_POWER_DATA}" "${GITHUB_RUN_ID}" "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" "${GITHUB_REPOSITORY_ID}" ".github/workflows/measure.yml" "${GITHUB_SHA}" "github" "${ECO_CI_SEND_DATA}" "${ECO_CI_FILTER_TYPE}" "${ECO_CI_FILTER_PROJECT}" "${ECO_CI_FILTER_MACHINE}" "${ECO_CI_FILTER_TAGS}" "${ECO_CI_CALCULATE_CO2}" "${ECO_CI_GMT_API_TOKEN}" "${ECO_CI_ELECTRICITYMAPS_API_TOKEN}" "${ECO_CI_JSON_OUTPUT}" "${ECO_CI_API_ENDPOINT_ADD}" "${ECO_CI_API_BADGE_GET}" "${ECO_CI_DASHBOARD_URL}"

      - name: Dummy Workload (replace with real job)
        run: |
          echo "Simulating deployment workload..."
          dd if=/dev/zero of=/dev/null bs=1M count=1000
          sleep 5

      - name: Get Measurement
        run: |
          /tmp/eco-ci-repo/scripts/make_measurement.sh make_measurement "${ECO_CI_LABEL}"
          
      - name: Display Results
        run: |
          /tmp/eco-ci-repo/scripts/display_results.sh display_results "${ECO_CI_DISPLAY_TABLE}" "${ECO_CI_DISPLAY_BADGE}"
          cat /tmp/eco-ci/output.txt

      - name: Send simple measurement results to webhook
        run: |
          curl -X POST "${ECO_CI_API_ENDPOINT_ADD}" \
            -H "Content-Type: text/plain" \
            --data-binary @/tmp/eco-ci/output.txt

