      #     # Construct JSON
      #     json=$(jq -n \
      #       --arg co2 "$CO2" \
      #       --arg energy "$ENERGY" \
      #       --arg job_id "$JOB_ID" \
      #       --arg sha "$COMMIT_SHA" \
      #       --arg repo "$REPO" \
