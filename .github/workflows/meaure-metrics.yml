name: Emit Real Sustainability Metrics

on: [push]

jobs:
  measure-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Clone green-metrics-tool
        run: git clone https://github.com/green-coding-solutions/green-metrics-tool.git

      - name: Run green-metrics-tool with build
        working-directory: green-metrics-tool
        run: |
          go run ./cmd/green-metrics-tool run --json --output ../result.json -- npm run build

      - name: View results
        run: cat result.json

      - name: Post Metrics to API
        env:
          API_URL: https://webhook.site/cf18b7b0-ddad-4cc2-8a6e-fc7cdfc8f973
        run: |
          curl -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            --data-binary @result.json
