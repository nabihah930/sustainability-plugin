name: Emit Actual Sustainability Metrics

on: [push]

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Scaphandre
        run: |
          curl -L https://github.com/hubblo-org/scaphandre/releases/latest/download/scaphandre_x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv scaphandre /usr/local/bin/

      - name: Install project dependencies
        run: npm install

      - name: Measure energy usage with Scaphandre
        run: |
          sudo scaphandre json > scaphandre-output.json &
          export SCAPH_PID=$!
          npm run build
          sleep 2
          kill $SCAPH_PID

      - name: Inspect output
        run: cat scaphandre-output.json

      - name: Post to the Test API
        run: |
          curl -X POST https://webhook.site/cf18b7b0-ddad-4cc2-8a6e-fc7cdfc8f973 \
          -H "Content-Type: application/json" \
          -d @scaphandre-output.json
