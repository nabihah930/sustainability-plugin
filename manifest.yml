modules:
  jira:dashboardGadget:
    - key: sustainability-plugin-gadget
      title: Green Track 🌳
      description: A Jira gadget to track sustainability.
      thumbnail: https://www.svgrepo.com/show/286077/sustainable-green.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/hello-world/build
permissions:
  scopes:
    - read:confluence-content.all
    - write:confluence-content
    - read:confluence-space.summary
    - read:confluence-user
    - storage:app

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/2c27ab5c-97b1-4e86-8d20-27b7e880d87b