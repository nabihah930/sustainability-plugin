modules:
  webtrigger:
    - key: metrics-web-trigger
      function: web-trigger
      response: # Dynamic web triggers do not need to define a response field and are dynamic by default.
        type: dynamic
    - key: sprint-closed-web-trigger
      function: on-sprint-closed
      response: # Dynamic web triggers do not need to define a response field and are dynamic by default.
        type: dynamic
  jira:dashboardGadget:
    - key: sustainability-plugin-gadget
      title: Green Track 🌳
      description: A Jira gadget to track sustainability.
      thumbnail: https://www.svgrepo.com/show/286077/sustainable-green.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
  trigger:
    - key: issue-updated-trigger
      function: resolver
      events:
        - avi:jira:updated:issue
    - key: sprint-started-trigger
      function: sprint-started
      events:
        - avi:jira-software:started:sprint
    - key: sprint-updated-trigger
      function: sprint-updated
      events:
        - avi:jira-software:updated:sprint
    - key: sprint-closed-trigger
      function: sprint-closed
      events:
        - avi:jira-software:closed:sprint
  jira:issuePanel:
    - key: accessibility-checklist-panel
      resource: main
      resolver:
        function: resolver
      title: Accessibility Checklist
      icon: https://raw.githubusercontent.com/dpashkevich/forge-jira-checklist/master/src/images/checkbox.svg
      layout: panel
      tooltip: WCAG 2.1 Accessibility Checklist
      target: page
      type: full
      weight: 50
      context: ["issue"]
  jira:globalPage:
    - key: sustainability-sidebar-icon
      resource: sidebar
      resolver:
        function: resolver
      title: Sustainability Metrics
      icon: https://www.svgrepo.com/show/530113/tree.svg
      context: ["issue"]
  jira:sprintAction:
  - key: open-sprint-preview
    resource: modal
    resolver:
      function: resolver
    title: Sprint Sustainability View
    icon: https://www.svgrepo.com/show/530113/tree.svg

  function:
    - key: resolver
      handler: index.handler
    - key: web-trigger
      handler: web-trigger.storeMetrics
    - key: on-sprint-closed
      handler: web-trigger.onSprintClosed
    - key: sprint-started
      handler: trigger.sprintStart
    - key: sprint-updated
      handler: trigger.sprintUpdate
    - key: sprint-closed
      handler: trigger.sprintClose

resources:
  - key: main
    path: static/hello-world/build
  - key: sidebar
    path: static/hello-world/build
  - key: modal
    path: static/hello-world/build

permissions:
  content:
    styles:
      - unsafe-inline
    scripts:
      - unsafe-inline
  scopes:
    - 'read:jira-work'
    - 'write:jira-work' 
    - 'read:jira-user'
    - 'storage:app'
    - 'write:confluence-content'
    - 'read:confluence-space.summary'
    - 'read:confluence-content.summary'
    - 'read:confluence-user'
    - 'write:page:confluence'
    - 'read:space:confluence'
    - 'read:sprint:jira-software'
    - 'read:issue:jira-software'
    - 'read:board-scope:jira-software'
    - 'read:issue-details:jira'
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/98b4c3cd-8fdf-42f7-9e94-4569543c9e32
